<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="页面未找到 - 有道云笔记导出助手">
    <meta name="robots" content="noindex">
    <title>404 - 页面未找到 | 有道云笔记导出助手</title>
    <link rel="icon" href="/favicon.png" type="image/png" sizes="64x64">
    <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
    <link rel="stylesheet" href="/style.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, rgb(132, 0, 255) 0%, rgb(102, 126, 234) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1rem;
        }
        .error-desc {
            font-size: 1.1rem;
            color: #888;
            max-width: 500px;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 1.8rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .error-btn-primary {
            background: linear-gradient(135deg, rgb(132, 0, 255) 0%, rgb(102, 126, 234) 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(132, 0, 255, 0.3);
        }
        .error-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(132, 0, 255, 0.4);
        }
        .error-btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ccc;
        }
        .error-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(132, 0, 255, 0.5);
            color: #fff;
        }
        .error-links {
            margin-top: 3rem;
            color: #666;
            font-size: 0.9rem;
        }
        .error-links a {
            color: rgb(132, 100, 255);
            text-decoration: none;
            margin: 0 0.8rem;
        }
        .error-links a:hover { text-decoration: underline; }
        @media (max-width: 768px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <nav class="homepage-nav">
        <div class="nav-content">
            <div class="nav-left">
                <a href="/">
                    <img src="/images/icon-36x36.png" alt="有道云笔记导出助手 Logo">
                    <span class="logo-text">有道云笔记导出助手</span>
                </a>
            </div>
            <div class="nav-center">
                <a href="/index.html#features" class="nav-link">功能特性</a>
                <a href="/index.html#privacy" class="nav-link">隐私保护</a>
                <a href="/blog/index.html" class="nav-link">博客</a>
                <a href="/about.html" class="nav-link">关于</a>
            </div>
            <div class="nav-right">
                <a href="https://github.com/Navyum/chrome-extension-youdaoyun" target="_blank" rel="noopener" class="nav-cta-button">
                    <span>获取扩展</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">页面走丢了</h1>
        <p class="error-desc">你要找的页面不存在或已被移动。别担心，你的有道云笔记还在，只是这个链接失效了。</p>
        <div class="error-actions">
            <a href="/" class="error-btn error-btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                返回首页
            </a>
            <a href="/blog/index.html" class="error-btn error-btn-secondary">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                浏览博客
            </a>
        </div>
        <div class="error-links">
            <a href="/">首页</a>
            <a href="/blog/index.html">博客</a>
            <a href="/about.html">关于</a>
            <a href="https://github.com/Navyum/chrome-extension-youdaoyun/issues" target="_blank" rel="noopener">报告问题</a>
        </div>
    </div>
</body>
</html>
